---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: yt-sync
  namespace: media
  labels:
    app: yt-sync
spec:
  # Run daily at 3:00 AM. Adjust as needed (crontab.guru is helpful).
  schedule: "0 3 * * *"

  # Never run two jobs simultaneously — if the previous run is still going, skip.
  concurrencyPolicy: Forbid

  # Keep the last 3 successful and 3 failed job pods for log inspection.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      # Retry the job up to 2 times on failure before giving up.
      backoffLimit: 2

      template:
        metadata:
          labels:
            app: yt-sync
        spec:
          restartPolicy: OnFailure

          # ---------------------------------------------------------------
          # PIA VPN sidecar (gluetun)
          # Declared as a native sidecar init container (requires K8s 1.29+).
          # It starts before the main container, keeps running for the life
          # of the pod, and is terminated after the main container exits.
          # All containers in the pod share the same network namespace, so
          # traffic from yt-sync is automatically routed through the VPN tunnel.
          # ---------------------------------------------------------------
          initContainers:
            - name: pia-vpn
              image: qmcgaw/gluetun:latest
              imagePullPolicy: Always
              restartPolicy: Always   # native sidecar — stays up while main container runs

              env:
                - name: VPN_SERVICE_PROVIDER
                  value: private internet access
                - name: VPN_TYPE
                  value: openvpn
                - name: OPENVPN_USER
                  valueFrom:
                    secretKeyRef:
                      name: pia-vpn-credentials
                      key: username
                - name: OPENVPN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: pia-vpn-credentials
                      key: password
                # Optional: pin to a specific region. Remove to let gluetun pick the
                # fastest available server. See gluetun docs for all region names:
                # https://github.com/qdm12/gluetun-wiki/blob/main/setup/providers/private-internet-access.md
                - name: SERVER_REGIONS
                  value: "US East"
                # Allow K8s pod (10.42.0.0/16) and service (10.43.0.0/16) subnets to
                # bypass the VPN firewall so CoreDNS and internal K8s traffic work.
                - name: FIREWALL_OUTBOUND_SUBNETS
                  value: "10.42.0.0/16,10.43.0.0/16"
                # Delay the VPN startup healthcheck by 6 hours — far longer than any
                # job run. gluetun's DNS-over-TLS healthcheck fails in Kubernetes (port
                # 853 is blocked by PIA) which causes it to continuously restart OpenVPN.
                # Skipping it keeps the tunnel stable for the duration of the sync.
                - name: HEALTH_VPN_DURATION_INITIAL
                  value: "6h"
                # Disable DNS blocklist downloads — not needed for yt-dlp, and
                # the downloads can OOM gluetun within its memory limit.
                - name: BLOCK_MALICIOUS
                  value: "off"
                - name: BLOCK_ADS
                  value: "off"
                - name: BLOCK_SURVEILLANCE
                  value: "off"
                # Expose the gluetun control server so the main container can poll
                # VPN readiness at http://localhost:8000/v1/vpn/status
              securityContext:
                capabilities:
                  add:
                    - NET_ADMIN

              volumeMounts:
                - name: tun-device
                  mountPath: /dev/net/tun

              readinessProbe:
                exec:
                  command:
                    - sh
                    - -c
                    - "ip link show tun0 2>/dev/null | grep -q 'tun0'"
                initialDelaySeconds: 5
                periodSeconds: 5
                failureThreshold: 24   # allow up to 2 minutes to connect

              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"

          containers:
            - name: yt-sync
              # Update this image tag after each build/push to your registry.
              # Recommended: use a specific sha256 digest in production.
              image: ghcr.io/natlight/yt-sync:latest
              imagePullPolicy: Always

              # The image's default ENTRYPOINT is the web service entrypoint.
              # The CronJob overrides it to run the original sync.py flow.
              command: ["/app/entrypoint.sh"]

              env:
                - name: CONFIG_FILE
                  value: /config/sources.yaml
                # Videos land at /media/YouTube Channels/<name>/ etc.
                - name: MEDIA_ROOT
                  value: /media
                # Music lands at /music/YouTube Music/<name>/
                - name: MUSIC_ROOT
                  value: /music
                # Archive files persist here between runs
                - name: ARCHIVE_DIR
                  value: /archive
                # Cookies file path inside the container (from secret)
                - name: COOKIES_FILE
                  value: /secrets/cookies.txt
                # Max videos to download per channel/playlist per run.
                # Prevents a single source from consuming an entire run.
                - name: MAX_DOWNLOADS_PER_SOURCE
                  value: "25"
                # How long (seconds) to wait for the VPN sidecar before aborting.
                - name: VPN_WAIT_TIMEOUT
                  value: "120"

              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: media
                  mountPath: /media
                - name: music
                  mountPath: /music
                - name: archive
                  mountPath: /archive
                - name: cookies
                  mountPath: /secrets
                  readOnly: true

              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "2Gi"
                  cpu: "1500m"

          volumes:
            - name: config
              configMap:
                name: yt-sync-config

            - name: media
              persistentVolumeClaim:
                claimName: yt-sync-videos-nfs-pvc

            - name: music
              persistentVolumeClaim:
                claimName: yt-sync-music-nfs-pvc

            - name: archive
              persistentVolumeClaim:
                claimName: yt-sync-archive-pvc

            # Secret is optional — public channels work without it.
            # Private playlists (Watch Later, Liked Videos) require cookies.
            - name: cookies
              secret:
                secretName: yt-sync-cookies
                optional: true

            # /dev/net/tun is required by gluetun to create the VPN tunnel interface.
            - name: tun-device
              hostPath:
                path: /dev/net/tun
