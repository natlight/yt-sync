---
# Edit this ConfigMap to add/remove channels and playlists.
# Apply changes with: kubectl apply -f k8s/configmap.yaml
# The CronJob picks up the new config on its next run (no restart needed).
apiVersion: v1
kind: ConfigMap
metadata:
  name: yt-sync-config
  namespace: media
  labels:
    app: yt-sync
data:
  sources.yaml: |
    # -------------------------------------------------------------------------
    # YouTube Channels
    # Each channel is downloaded into:
    #   <media_root>/YouTube Channels/<name>/
    #
    # Use the channel's @handle URL (preferred) or /channel/UCxxxxxx URL.
    # Only new videos (not in the archive) are downloaded each run.
    # -------------------------------------------------------------------------
    channels:
      - name: "Matthew Berman"
        url: "https://www.youtube.com/@matthew_berman"
        date_after: "20260412"  # only download videos published on/after this date

      # Add more channels here:
      # - name: "Linus Tech Tips"
      #   url: "https://www.youtube.com/@LinusTechTips"

    # -------------------------------------------------------------------------
    # YouTube Playlists / Watchlists
    # Each playlist is downloaded into:
    #   <media_root>/YouTube Playlists/<name>/
    #
    # Provide either a full URL or just the playlist id (PLxxxxxx / WL / LL etc.)
    # Private playlists (Watch Later = WL, Liked Videos = LL) require cookies.
    # See k8s/secret-instructions.md for how to export and store cookies.
    # -------------------------------------------------------------------------
    playlists:
      - name: "Watch Later"
        id: "WL"

      # - name: "Liked Videos"
      #   id: "LL"

      # - name: "My Playlist"
      #   id: "PLxxxxxxxxxxxxxxxxxx"

      # Full URL also works:
      # - name: "Tech Reviews"
      #   url: "https://www.youtube.com/playlist?list=PLxxxxxxxxxxxxxxxxxx"

    # -------------------------------------------------------------------------
    # YouTube Music Playlists (audio-only, goes to Jellyfin Music library)
    # Each playlist is downloaded into:
    #   <music_root>/YouTube Music/<name>/
    # as opus files (YouTube's native audio codec — no re-encoding).
    #
    # Use YouTube Music playlist URLs (music.youtube.com) or regular
    # youtube.com playlist IDs — both work with yt-dlp.
    # Private playlists require cookies (same secret as above).
    # -------------------------------------------------------------------------
    music_playlists:
      - name: "My Music Mix"
        id: "PLxxxxxxxxxxxxxxxxxx"

      # - name: "Liked Music"
      #   id: "LM"

      # Full YouTube Music URL also works:
      # - name: "Workout Mix"
      #   url: "https://music.youtube.com/playlist?list=PLxxxxxxxxxxxxxxxxxx"
      - name: "Fingerstyle"
        url: "https://music.youtube.com/playlist?list=PLkLzHrXlITEUAaJEzvnq3pERxn-JM4BC6"
