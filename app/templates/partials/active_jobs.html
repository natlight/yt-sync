{% if rows %}
  <ul class="text-sm space-y-1">
    {% for j in rows %}
      <li class="flex justify-between border-b border-slate-700 py-1">
        <a href="#" hx-get="/jobs/{{ j.id }}/status" hx-target="#job-status-area" hx-swap="innerHTML"
           class="text-slate-200 truncate">
          #{{ j.id }} {{ j.kind }}{% if j.source_id %} · src {{ j.source_id }}{% endif %}{% if j.oneoff_url %} · {{ j.oneoff_url[:40] }}{% endif %}
        </a>
        <span class="text-slate-400 ml-2">{{ j.status }}</span>
      </li>
    {% endfor %}
  </ul>
  <div id="job-status-area" class="mt-3"></div>
{% else %}
  <p class="text-slate-400 text-sm">No active jobs.</p>
{% endif %}
