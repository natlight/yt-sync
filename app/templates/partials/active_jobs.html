{% if rows %}
  <ul style="font-size:13px; list-style:none; padding:0; margin:0;">
    {% for j in rows %}
      <li style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #0a1f0a; padding:4px 0;">
        <a href="#" hx-get="/jobs/{{ j.id }}/status" hx-target="#job-status-area" hx-swap="innerHTML"
           style="color:var(--green); text-decoration:none; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
          <span class="muted">#{{ j.id }}</span>
          <span style="color:var(--cyan);">{{ j.kind }}</span>
          {% if j.source_id %}<span class="muted"> · src:{{ j.source_id }}</span>{% endif %}
          {% if j.oneoff_url %}<span class="muted"> · {{ j.oneoff_url[:40] }}</span>{% endif %}
        </a>
        <span class="status-run" style="font-size:11px; white-space:nowrap; margin-left:8px;">{{ j.status | upper }}</span>
      </li>
    {% endfor %}
  </ul>
  <div id="job-status-area" class="mt-3"></div>
{% else %}
  <p class="muted" style="font-size:12px;">> NO ACTIVE PROCESSES.</p>
{% endif %}
