{% extends "base.html" %}
{% block title %}DOWNLOADS // YT-SYNC{% endblock %}
{% block content %}

<div style="margin-bottom:16px;">
  <h1 class="page-title">DOWNLOAD ARCHIVE</h1>
</div>

<form class="card p-3 mb-4"
      hx-get="/downloads/table"
      hx-target="#dl-table"
      hx-trigger="change, keyup delay:300ms from:input[name='q']"
      hx-swap="innerHTML"
      style="display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px;">

  <div>
    <div class="muted" style="font-size:10px; letter-spacing:2px; margin-bottom:3px;">FILTER: TYPE</div>
    <select name="type" style="width:100%; padding:4px 6px;">
      <option value="">ALL TYPES</option>
      {% for t in ['channel', 'playlist', 'music'] %}
        <option value="{{ t }}" {% if filter_type == t %}selected{% endif %}>{{ t | upper }}</option>
      {% endfor %}
    </select>
  </div>

  <div>
    <div class="muted" style="font-size:10px; letter-spacing:2px; margin-bottom:3px;">FILTER: STATUS</div>
    <select name="status" style="width:100%; padding:4px 6px;">
      <option value="">ALL STATUS</option>
      {% for st in ['ok', 'skipped', 'error'] %}
        <option value="{{ st }}" {% if filter_status == st %}selected{% endif %}>{{ st | upper }}</option>
      {% endfor %}
    </select>
  </div>

  <div>
    <div class="muted" style="font-size:10px; letter-spacing:2px; margin-bottom:3px;">FILTER: SOURCE</div>
    <select name="source_id" style="width:100%; padding:4px 6px;">
      <option value="">ALL SOURCES</option>
      {% for s in sources %}
        <option value="{{ s.id }}" {% if filter_source_id == s.id %}selected{% endif %}>{{ s.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div style="grid-column: span 2;">
    <div class="muted" style="font-size:10px; letter-spacing:2px; margin-bottom:3px;">SEARCH: TITLE / VIDEO ID</div>
    <input name="q" value="{{ filter_q }}" placeholder="> enter search query..."
           style="width:100%; padding:4px 6px;" />
  </div>

</form>

<div id="dl-table">
  {% include "downloads/_table.html" %}
</div>

{% endblock %}
