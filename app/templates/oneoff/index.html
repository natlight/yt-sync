{% extends "base.html" %}
{% block title %}One-off download — yt-sync{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold text-white mb-4">One-off download</h1>

<form class="card rounded-lg p-4 max-w-2xl space-y-4"
      hx-post="/oneoff"
      hx-target="#job-status-area"
      hx-swap="innerHTML">
  <div>
    <label class="block text-sm text-slate-300 mb-1">URL</label>
    <input name="url" required placeholder="https://www.youtube.com/watch?v=..."
           class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1 text-slate-100" />
  </div>
  <div class="flex gap-4 text-slate-300">
    <label class="flex items-center gap-2"><input type="radio" name="type" value="video" checked> Video</label>
    <label class="flex items-center gap-2"><input type="radio" name="type" value="music"> Music (audio only)</label>
  </div>
  <button type="submit" class="btn bg-emerald-600 hover:bg-emerald-500 text-white">Start download</button>
</form>

<div id="job-status-area" class="mt-6"></div>
{% endblock %}
