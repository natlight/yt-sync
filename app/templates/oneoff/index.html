{% extends "base.html" %}
{% block title %}ONE-OFF DOWNLOAD // YT-SYNC{% endblock %}
{% block content %}

<h1 class="page-title" style="margin-bottom:20px;">> ONE-OFF DOWNLOAD</h1>

<form class="card p-5"
      style="max-width:640px;"
      hx-post="/oneoff"
      hx-target="#job-status-area"
      hx-swap="innerHTML">

  <div style="margin-bottom:16px;">
    <label style="display:block; font-size:11px; letter-spacing:2px; color:var(--green-dim); margin-bottom:4px;">TARGET URL</label>
    <input name="url" required placeholder="https://www.youtube.com/watch?v=..."
           style="width:100%; padding:5px 8px;" />
  </div>

  <div style="margin-bottom:20px;">
    <div style="font-size:11px; letter-spacing:2px; color:var(--green-dim); margin-bottom:8px;">DOWNLOAD MODE</div>
    <div style="display:flex; gap:20px;">
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px;">
        <input type="radio" name="type" value="video" checked />
        <span>VIDEO (full)</span>
      </label>
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px;">
        <input type="radio" name="type" value="music" />
        <span style="color:#cc44ff; text-shadow:0 0 6px #cc44ff;">MUSIC (audio only)</span>
      </label>
    </div>
  </div>

  <button type="submit" class="btn btn-primary" style="letter-spacing:2px; padding:6px 20px;">
    [ INITIATE DOWNLOAD ]
  </button>

</form>

<div id="job-status-area" class="mt-6"></div>

{% endblock %}
