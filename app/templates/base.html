<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}YT-SYNC TERMINAL{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <style>
    :root {
      --green:      #00ff41;
      --green-dim:  #00b32c;
      --green-dark: #003810;
      --green-bg:   #020d02;
      --amber:      #ffb000;
      --red:        #ff3333;
      --cyan:       #00e5ff;
      --white:      #ccffcc;
    }

    * { box-sizing: border-box; }

    body {
      background: #000;
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      min-height: 100vh;
      position: relative;
    }

    /* CRT phosphor glow on text */
    body { text-shadow: 0 0 8px rgba(0, 255, 65, 0.4); }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.12) 3px,
        rgba(0, 0, 0, 0.12) 4px
      );
      pointer-events: none;
      z-index: 9998;
    }

    /* Subtle screen vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
      z-index: 9997;
    }

    .card {
      background: var(--green-bg);
      border: 1px solid var(--green-dim);
      box-shadow: 0 0 12px rgba(0, 255, 65, 0.1), inset 0 0 20px rgba(0, 0, 0, 0.6);
    }

    .card-bright {
      background: var(--green-bg);
      border: 1px solid var(--green);
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.2), inset 0 0 20px rgba(0, 0, 0, 0.6);
    }

    /* Form inputs */
    input, select, textarea {
      background: #000 !important;
      border: 1px solid var(--green-dim) !important;
      color: var(--green) !important;
      font-family: 'Share Tech Mono', monospace !important;
      font-size: 13px;
      outline: none;
      text-shadow: 0 0 6px rgba(0, 255, 65, 0.5);
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--green) !important;
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.4) !important;
    }
    input::placeholder { color: var(--green-dark) !important; opacity: 1; }
    option { background: #000; color: var(--green); }

    /* Checkbox */
    input[type="checkbox"] {
      accent-color: var(--green);
      width: 14px; height: 14px;
    }
    input[type="radio"] { accent-color: var(--green); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      border: 1px solid var(--green-dim);
      background: #000;
      color: var(--green);
      cursor: pointer;
      text-shadow: 0 0 6px rgba(0, 255, 65, 0.6);
      transition: all 0.1s;
      text-decoration: none;
    }
    .btn:hover {
      border-color: var(--green);
      background: var(--green-dark);
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
      color: var(--green);
    }

    .btn-primary {
      border-color: var(--green);
      color: var(--green);
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.8);
    }
    .btn-primary:hover {
      background: var(--green);
      color: #000;
      text-shadow: none;
    }

    .btn-danger {
      border-color: var(--red);
      color: var(--red);
    }
    .btn-danger:hover {
      background: var(--red);
      color: #000;
      text-shadow: none;
    }

    .btn-secondary {
      border-color: #333;
      color: #666;
    }
    .btn-secondary:hover {
      border-color: var(--green-dim);
      color: var(--green-dim);
    }

    /* Section headers */
    .section-header {
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: var(--green);
      text-shadow: 0 0 12px rgba(0, 255, 65, 0.7);
      letter-spacing: 2px;
      border-bottom: 1px solid var(--green-dark);
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    /* Page title */
    .page-title {
      font-family: 'VT323', monospace;
      font-size: 28px;
      color: var(--green);
      text-shadow: 0 0 16px rgba(0, 255, 65, 0.8);
      letter-spacing: 3px;
    }

    /* Tables */
    table { border-collapse: collapse; width: 100%; }
    thead th {
      color: var(--green-dim);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 8px;
      border-bottom: 1px solid var(--green-dark);
      background: #000;
    }
    tbody tr { border-bottom: 1px solid #0a1f0a; }
    tbody tr:hover { background: #020d02; }
    td { padding: 6px 8px; vertical-align: middle; }

    /* Status badges */
    .status-ok    { color: var(--green); text-shadow: 0 0 8px var(--green); }
    .status-err   { color: var(--red);   text-shadow: 0 0 8px var(--red); }
    .status-run   { color: var(--cyan);  text-shadow: 0 0 8px var(--cyan); }
    .status-skip  { color: #444; }

    /* Toggle buttons */
    .toggle-on {
      background: var(--green-dark);
      border: 1px solid var(--green);
      color: var(--green);
      font-size: 11px;
      padding: 1px 8px;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
    }
    .toggle-off {
      background: #000;
      border: 1px solid #333;
      color: #444;
      font-size: 11px;
      padding: 1px 8px;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
    }
    .toggle-on:hover, .toggle-off:hover {
      border-color: var(--green-dim);
      color: var(--green-dim);
    }

    /* Blinking cursor */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor::after { content: '█'; animation: blink 1s step-end infinite; color: var(--green); }

    /* Prompt prefix */
    .prompt::before { content: '> '; color: var(--green-dim); }

    /* Type labels */
    .type-channel  { color: var(--cyan); }
    .type-playlist { color: var(--amber); }
    .type-music    { color: #cc44ff; text-shadow: 0 0 8px #cc44ff; }

    /* HTMX indicator */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request.htmx-indicator { display: inline-block; }

    /* Action links in tables */
    .action-run    { color: var(--green);     font-size: 12px; cursor: pointer; background: none; border: none; font-family: inherit; text-shadow: 0 0 6px var(--green); }
    .action-edit   { color: var(--cyan);      font-size: 12px; cursor: pointer; }
    .action-delete { color: var(--red);       font-size: 12px; cursor: pointer; background: none; border: none; font-family: inherit; }
    .action-run:hover    { text-shadow: 0 0 12px var(--green); }
    .action-edit:hover   { text-shadow: 0 0 12px var(--cyan); }
    .action-delete:hover { text-shadow: 0 0 12px var(--red); }

    /* Disk usage bar */
    .usage-bar-bg   { background: #0a1f0a; border: 1px solid var(--green-dark); height: 8px; }
    .usage-bar-fill { background: var(--green-dim); height: 100%; box-shadow: 0 0 6px var(--green-dim); }

    /* Pre/log output */
    pre {
      background: #000;
      border: 1px solid var(--green-dark);
      color: var(--green-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 8px;
      overflow: auto;
    }

    /* Amber warning */
    .warn { color: var(--amber); text-shadow: 0 0 8px var(--amber); }

    /* Dim text */
    .dim { color: var(--green-dark); }
    .muted { color: #336633; }

    /* Link styles */
    a { color: var(--cyan); text-decoration: none; }
    a:hover { text-shadow: 0 0 10px var(--cyan); }

    /* Mono label value */
    .val { color: var(--white); font-family: 'Share Tech Mono', monospace; }

    /* Footer */
    #sys-footer {
      border-top: 1px solid var(--green-dark);
      color: var(--green-dark);
      font-size: 11px;
      padding: 4px 16px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  {% include "_nav.html" %}
  <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
    {% block content %}{% endblock %}
  </main>
  <footer id="sys-footer">
    <span>YT-SYNC TERMINAL v1.0 // SYSTEM ONLINE</span>
    <span id="sys-clock"></span>
  </footer>
  <script>
    // Live clock in footer
    function tick() {
      const el = document.getElementById('sys-clock');
      if (el) el.textContent = new Date().toLocaleString('en-US', {
        timeZone: 'America/Chicago',
        year: 'numeric', month: 'short', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false, timeZoneName: 'short'
      });
    }
    tick(); setInterval(tick, 1000);
  </script>
</body>
</html>
